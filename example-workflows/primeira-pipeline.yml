name: Deploy Node API

on:
  push:
    branches: [ main ]

jobs:

  build:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: primeira-pipeline

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

  deploy:

    needs: build

    runs-on: ubuntu-latest

    steps:

      - name: Deploy Render
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}